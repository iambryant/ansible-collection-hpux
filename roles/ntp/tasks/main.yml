---
- name: "Ensure ntp.conf is rendered"
  ansible.builtin.template:
    src: ntp.conf.j2
    dest: /etc/ntp.conf
    owner: bin
    group: bin
    mode: '0644'
  notify: Restart ntpd

- name: "Ensure ntpd is enabled in netdaemons"
  ansible.builtin.lineinfile:
    path: /etc/rc.config.d/netdaemons
    regexp: '^export XNTPD='
    line: "export XNTPD=1"
