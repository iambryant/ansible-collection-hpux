---
- name: "Ensure logical volumes meet size prerequisites"
  ansible.builtin.include_tasks: resize_lv.yml
  loop: "{{ ignite_ux_logical_volumes }}"

- name: "Check if Ignite-UX is installed"
  ansible.builtin.command: "/usr/sbin/swlist Ignite-UX"
  register: ignite_ux_install_check
  failed_when: false
  changed_when: false

- name: "Installation block"
  when: ignite_ux_install_check.rc != 0
  block:
    - name: "Ensure depot files are copied"
      ansible.builtin.copy:
        src: "{{ ignite_ux_depot }}"
        dest: "{{ hpux_staging_dir }}/ignite_ux.depot"
        mode: '0644'

    - name: "Ensure Ignite-UX is installed"
      community.general.swdepot:
        name: Ignite-UX
        state: present
        depot: "{{ hpux_staging_dir }}/ignite_ux.depot"

    - name: "Ensure depot files are absent"
      ansible.builtin.file:
        path: "{{ hpux_staging_dir }}/ignite_ux.depot"
        state: absent

- name: "Check if Ignite-UX share is present"
  ansible.builtin.command: "share"
  register: ignite_ux_share_check
  changed_when: false

- name: "Ensure Ignite-UX NFS shares are enabled"
  ansible.builtin.command: "/opt/ignite/lbin/setup_server -n"
  register: ignite_ux_share_out
  when: "'/var/opt/ignite/clients' not in ignite_ux_share_check.stdout"
  failed_when: "'Program completed successfully' not in ignite_ux_share_out.stdout"

- name: "Ensure Ignite archive entry is present in dfstab"
  ansible.builtin.lineinfile:
    path: /etc/dfs/dfstab
    line: "share -F nfs -o anon=2,ro /var/opt/ignite/archives/Rel_B.11.31"
    state: present
  notify: Refresh nfs shares

- name: "Ensure the bootpd daemon is enabled and running"
  ansible.builtin.lineinfile:
    path: /etc/inetd.conf
    regexp: '^#\s*(bootps\s+dgram\s+udp\s+wait\s+root\s+/usr/lbin/bootpd\s+bootpd)'
    line: 'bootps dgram udp wait root /usr/lbin/bootpd bootpd'
    backrefs: true
  notify: Reload inetd

- name: "Ensure Rel_B.11.31 directories are present"
  ansible.builtin.file:
    path: "{{ item }}/Rel_B.11.31"
    state: directory
    mode: '0755'
  loop:
    - /var/opt/ignite/data
    - /var/opt/ignite/archives
    - /var/opt/ignite/depots

- name: "Ensure Ignite INDEX file is present"
  ansible.builtin.copy:
    src: "INDEX"
    dest: "/var/opt/ignite/data/INDEX"
    mode: '0644'

- name: "Ensure user-specified Ignite files are copied"
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop: "{{ ignite_ux_user_files }}"
  when: ignite_ux_user_files | length > 0

- name: "Ensure user-specified Ignite templates are rendered"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop: "{{ ignite_ux_user_templates }}"
  when: ignite_ux_user_templates | length > 0
